<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2028 대학별 대입전형계획 아카이브</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans KR',sans-serif;background:#f0f2f6;color:#1a1a2e;min-height:100vh;}

  /* ── 상단 헤더 ── */
  .topbar{
    background:linear-gradient(135deg,#1e3a5f 0%,#2563eb 100%);
    padding:16px 28px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;
    box-shadow:0 2px 12px rgba(37,99,235,.25);
  }
  .logo{font-size:18px;font-weight:700;color:#fff;white-space:nowrap;letter-spacing:-.3px;}
  .logo em{color:#93c5fd;font-style:normal;}
  .sel-wrap{display:flex;align-items:center;gap:10px;flex:1;min-width:220px;}
  .sel-label{font-size:13px;color:#bfdbfe;white-space:nowrap;}
  select.univ{
    flex:1;max-width:380px;padding:9px 14px;
    border:1.5px solid rgba(255,255,255,.25);border-radius:8px;
    font-size:13px;font-family:inherit;color:#1e3a5f;
    background:#fff;cursor:pointer;outline:none;
    transition:border-color .15s;
  }
  select.univ:focus{border-color:#93c5fd;}

  /* ── 메인 레이아웃 ── */
  .main{display:grid;grid-template-columns:1fr 490px;height:calc(100vh - 60px);overflow:hidden;}

  /* ── PDF 패널 ── */
  .pdf-panel{display:flex;flex-direction:column;padding:16px;overflow:hidden;}
  .card{
    background:#fff;border:1px solid #e2e8f0;border-radius:12px;
    overflow:hidden;flex:1;display:flex;flex-direction:column;
    box-shadow:0 1px 4px rgba(0,0,0,.06);
  }
  .card-head{
    padding:12px 16px;border-bottom:1px solid #f1f5f9;
    display:flex;align-items:center;justify-content:space-between;
    background:#fafbfc;
  }
  .card-title{font-size:13px;font-weight:600;color:#374151;display:flex;align-items:center;gap:6px;}
  .hbtn-group{display:flex;gap:6px;}
  .hbtn{
    padding:6px 12px;font-size:12px;font-family:inherit;
    border-radius:6px;border:1px solid #d1d5db;background:#fff;
    color:#4b5563;cursor:pointer;transition:all .12s;
    display:inline-flex;align-items:center;gap:4px;
  }
  .hbtn:hover{background:#f3f4f6;border-color:#9ca3af;}
  .hbtn.pri{background:#2563eb;color:#fff;border-color:#2563eb;}
  .hbtn.pri:hover{background:#1d4ed8;}
  .file-bar{
    padding:9px 16px;background:#f8fafc;border-bottom:1px solid #f1f5f9;
    font-size:12px;color:#64748b;display:flex;align-items:center;gap:6px;
  }
  .pdf-body{flex:1;overflow:hidden;display:flex;flex-direction:column;}
  iframe.pdf-frame{flex:1;width:100%;border:none;display:block;}

  /* ── 분석 패널 ── */
  .analysis-panel{
    border-left:1px solid #e2e8f0;background:#fff;
    display:flex;flex-direction:column;overflow:hidden;
  }
  .ap-head{
    padding:13px 18px;border-bottom:1px solid #e2e8f0;
    display:flex;align-items:center;justify-content:space-between;
    background:#fafbfc;
  }
  .ap-title{font-size:13px;font-weight:600;color:#374151;display:flex;align-items:center;gap:6px;}
  .badge-count{
    display:inline-block;padding:2px 7px;border-radius:10px;
    background:#dbeafe;color:#1d4ed8;font-size:11px;font-weight:600;
  }
  .ap-body{flex:1;overflow-y:auto;padding:16px 18px;}
  .ap-body::-webkit-scrollbar{width:5px;}
  .ap-body::-webkit-scrollbar-track{background:#f8fafc;}
  .ap-body::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px;}

  /* ── 플레이스홀더 ── */
  .ph{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;padding:30px;text-align:center;}
  .ph-icon{font-size:52px;opacity:.1;}
  .ph-title{font-size:15px;font-weight:600;color:#94a3b8;}
  .ph-sub{font-size:12px;color:#cbd5e1;line-height:1.8;}

  /* ── 분석 배너 ── */
  .ok-banner{
    background:linear-gradient(135deg,#f0fdf4,#dcfce7);
    border:1px solid #86efac;border-radius:8px;
    padding:10px 14px;font-size:12px;color:#166534;
    display:flex;align-items:center;gap:7px;margin-bottom:16px;
    font-weight:500;
  }

  /* ── 섹션 헤더 ── */
  .sec-head{display:flex;align-items:center;gap:7px;margin:16px 0 10px;}
  .sec-head:first-of-type{margin-top:0;}
  .sec-badge{
    padding:4px 11px;border-radius:5px;
    font-size:11px;font-weight:700;letter-spacing:.04em;
  }
  .badge-blue{background:#dbeafe;color:#1d4ed8;}
  .badge-green{background:#dcfce7;color:#166534;}
  .badge-amber{background:#fef3c7;color:#92400e;}
  .badge-red{background:#fee2e2;color:#991b1b;}
  .badge-purple{background:#ede9fe;color:#6d28d9;}
  .badge-sky{background:#e0f2fe;color:#0369a1;}
  .badge-gray{background:#f1f5f9;color:#475569;}
  .sec-line{flex:1;height:1px;background:#f1f5f9;}

  /* ── 전형 테이블 ── */
  .tbl-wrap{overflow-x:auto;margin-bottom:4px;border-radius:8px;border:1px solid #e2e8f0;}
  table.mtbl{width:100%;border-collapse:collapse;font-size:11.5px;}
  table.mtbl thead tr{background:#f8fafc;}
  table.mtbl thead th{
    padding:9px 11px;text-align:left;font-weight:600;
    color:#475569;border-bottom:2px solid #e2e8f0;white-space:nowrap;
  }
  table.mtbl tbody tr{border-bottom:1px solid #f1f5f9;transition:background .1s;}
  table.mtbl tbody tr:last-child{border-bottom:none;}
  table.mtbl tbody tr:hover{background:#f8fafc;}
  table.mtbl tbody td{padding:10px 11px;color:#374151;vertical-align:top;line-height:1.55;}
  table.mtbl td.nm{font-weight:600;color:#1e3a5f;min-width:120px;}
  table.mtbl td.mt{min-width:155px;white-space:pre-line;font-size:11.5px;}
  table.mtbl td.cnt{min-width:58px;color:#64748b;font-size:11px;}
  table.mtbl td.crit{min-width:86px;}
  table.mtbl td.note{color:#64748b;font-size:11px;min-width:100px;line-height:1.5;}

  /* ── 수능최저 뱃지 ── */
  .crit-yes{display:inline-block;padding:2px 7px;background:#fee2e2;color:#dc2626;border-radius:3px;font-size:10px;font-weight:700;}
  .crit-no{display:inline-block;padding:2px 7px;background:#dcfce7;color:#16a34a;border-radius:3px;font-size:10px;font-weight:700;}
  .crit-tbd{display:inline-block;padding:2px 7px;background:#f1f5f9;color:#94a3b8;border-radius:3px;font-size:10px;font-weight:600;}
  .crit-detail{font-size:10.5px;color:#374151;margin-top:4px;line-height:1.5;}

  /* ── 미니카드 (논술·실기) ── */
  .mini-card{
    background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;
    padding:11px 13px;margin-bottom:8px;
  }
  .mc-name{font-size:12px;font-weight:600;color:#1e3a5f;margin-bottom:6px;}
  .mc-row{display:flex;gap:7px;font-size:11.5px;margin-bottom:4px;align-items:flex-start;}
  .mc-lbl{color:#94a3b8;min-width:50px;font-weight:500;flex-shrink:0;}
  .mc-val{color:#374151;line-height:1.5;flex:1;}

  /* ── 노트박스 ── */
  .note-box{
    background:#fffbeb;border-left:3px solid #fbbf24;
    padding:7px 10px;border-radius:3px;
    font-size:11px;color:#78350f;line-height:1.55;margin-top:6px;
  }
  .info-box{
    background:#f0f9ff;border-left:3px solid #38bdf8;
    padding:8px 11px;border-radius:3px;
    font-size:11.5px;color:#0c4a6e;line-height:1.6;margin-top:6px;
  }

  /* ── 일정 테이블 ── */
  .sched-table{width:100%;border-collapse:collapse;font-size:12px;}
  .sched-table td{padding:7px 10px;border-bottom:1px solid #f1f5f9;vertical-align:top;}
  .sched-table td:first-child{color:#64748b;font-weight:500;width:90px;white-space:nowrap;}
  .sched-table tr:last-child td{border-bottom:none;}

  /* ── 구분선 ── */
  .divider{border:none;border-top:1px solid #e2e8f0;margin:16px 0;}

  /* ── 업데이트 정보 ── */
  .update-info{
    font-size:10.5px;color:#94a3b8;text-align:center;
    padding:10px;border-top:1px solid #f1f5f9;margin-top:6px;
  }


  .api-key-btn{
    padding:7px 14px;font-size:12px;font-family:inherit;
    border-radius:7px;border:1.5px solid rgba(255,255,255,.3);
    background:rgba(255,255,255,.12);color:#fff;cursor:pointer;
    transition:all .15s;white-space:nowrap;margin-left:auto;
  }
  .api-key-btn:hover{background:rgba(255,255,255,.25);}
  .ai-loading{display:flex;flex-direction:column;align-items:center;
    justify-content:center;height:100%;gap:16px;padding:30px;text-align:center;}
  .ai-spinner{width:38px;height:38px;border:3px solid #e2e8f0;
    border-top-color:#2563eb;border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .ai-loading-title{font-size:14px;font-weight:600;color:#374151;}
  .ai-loading-sub{font-size:12px;color:#94a3b8;line-height:1.8;}
  .ai-badge{display:inline-block;padding:2px 7px;background:#f0fdf4;
    color:#16a34a;border-radius:10px;font-size:10px;font-weight:600;margin-left:6px;vertical-align:middle;}
  .reanalyze-btn{
    padding:4px 10px;font-size:11px;font-family:inherit;
    border-radius:5px;border:1px solid #d1d5db;background:#f9fafb;
    color:#6b7280;cursor:pointer;transition:all .12s;margin-left:6px;vertical-align:middle;
  }
  .reanalyze-btn:hover{background:#f3f4f6;color:#374151;}

  .made-by{font-size:11px;color:rgba(255,255,255,.55);white-space:nowrap;margin-left:auto;letter-spacing:.2px;}
  .made-by strong{color:rgba(255,255,255,.8);}
  /* ── 탭 버튼 (모바일용) ── */
  .tab-bar{display:none;}
  @media(max-width:900px){
    .tab-bar{
      display:flex;background:#fff;border-bottom:2px solid #e2e8f0;
      position:sticky;top:0;z-index:10;
    }
    .tab-btn{
      flex:1;padding:12px;font-size:13px;font-weight:600;
      font-family:inherit;border:none;background:none;
      color:#94a3b8;cursor:pointer;border-bottom:3px solid transparent;
      margin-bottom:-2px;transition:all .15s;
    }
    .tab-btn.active{color:#2563eb;border-bottom-color:#2563eb;}
    .main{
      grid-template-columns:1fr;
      height:auto;overflow:visible;
    }
    .pdf-panel{
      display:none;padding:10px;
      height:calc(100vh - 120px);
    }
    .pdf-panel.tab-active{display:flex;}
    .analysis-panel{
      display:none;border-left:none;border-top:1px solid #e2e8f0;
    }
    .analysis-panel.tab-active{display:flex;}
    .topbar{padding:10px 14px;gap:10px;}
    .logo{font-size:15px;}
    .sel-label{display:none;}
    select.univ{max-width:100%;}
    .api-key-btn{padding:6px 10px;font-size:11px;}
    .made-by{display:none;}
    .ap-body{max-height:none;overflow-y:visible;padding:12px 14px;}
    table.mtbl{font-size:11px;}
    .tbl-wrap{overflow-x:auto;}
  }
  /* ── 반응형 ── */
  @media(min-width:901px){
    .tab-bar{display:none !important;}
    .pdf-panel{display:flex !important;}
    .analysis-panel{display:flex !important;}
  }
</style>
</head>

/* PDF.js 로 PDF 렌더링 */
let pdfJsLoaded = false;

function loadPdfJsLib(callback){
  if(pdfJsLoaded){ callback(); return; }
  const s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
  s.onload = function(){
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    pdfJsLoaded = true;
    callback();
  };
  document.head.appendChild(s);
}

async function renderPdfJs(file){
  loadPdfJsLib(async function(){
    try {
      const container = document.getElementById('pdfViewer');
      if(!container) return;
      container.innerHTML = '';
      const pdf = await pdfjsLib.getDocument(file).promise;
      const totalPages = pdf.numPages;
      for(let p = 1; p <= totalPages; p++){
        const page = await pdf.getPage(p);
        const viewport = page.getViewport({scale: 1.4});
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        canvas.style.cssText = 'width:100%;max-width:700px;background:#fff;border-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,.3);';
        container.appendChild(canvas);
        await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;
      }
    } catch(e) {
      const container = document.getElementById('pdfViewer');
      if(container) container.innerHTML =
        '<div style="display:flex;flex-direction:column;align-items:center;gap:14px;padding:40px;text-align:center;">' +
        '<div style="font-size:36px;opacity:.3;">📄</div>' +
        '<div style="color:#fff;font-size:13px;">PDF를 불러올 수 없습니다</div>' +
        '<a href="' + file + '" target="_blank" style="padding:9px 18px;background:#2563eb;color:#fff;border-radius:7px;font-size:13px;text-decoration:none;">새 탭에서 열기</a>' +
        '</div>';
    }
  });
}

/* ── 헬퍼: 교과 테이블 (산출방식 포함) ── */
function buildTable교과(rows){
  if(!rows.length) return '';
  let h = `<div class="tbl-wrap"><table class="mtbl">
    <thead><tr>
      <th>전형명</th>
      <th>모집인원</th>
      <th>전형방법</th>
      <th>수능최저</th>
      <th>교과 산출방식</th>
      <th>비고</th>
    </tr></thead><tbody>`;
  rows.forEach(r => {
    let critHtml;
    if(r.crit === null) critHtml = `<span class="crit-tbd">미정</span>`;
    else if(r.crit)     critHtml = `<span class="crit-yes">적용</span>${r.cd ? `<div class="crit-detail">${r.cd.replace(/\n/g,'<br>')}</div>` : ''}`;
    else                critHtml = `<span class="crit-no">없음</span>`;
    const 산출Html = r.산출 ? r.산출.replace(/\n/g,'<br>') : '—';
    h += `<tr>
      <td class="nm">${r.nm}</td>
      <td class="cnt">${r.cnt}</td>
      <td class="mt">${r.mt.replace(/\n/g,'<br>')}</td>
      <td class="crit">${critHtml}</td>
      <td class="note" style="min-width:160px;color:#1e3a5f;">${산출Html}</td>
      <td class="note">${r.note || '—'}</td>
    </tr>`;
  });
  h += `</tbody></table></div>`;
  return h;
}

function miniCard(x){
  let h = `<div class="mini-card">`;

  h += `<div class="mc-row"><span class="mc-lbl">모집인원</span><span class="mc-val">${x.cnt}</span></div>`;

function arrayBufferToBase64(buf){
  var bytes = new Uint8Array(buf), bin = '';
  for(var i = 0; i < bytes.byteLength; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}

    '<div class="ai-loading-title">🤖 AI 전형 분석 중...</div>' +
    '<div class="ai-loading-sub"><strong>' + univName + '</strong><br>' +
    'PDF를 읽고 전형 정보를 분석하고 있습니다.<br>10~30초 정도 소요됩니다.</div>' +
    '</div>';

  /* API 키 확인 */
  var key = localStorage.getItem('anthro_key') || '';
  if(!key){
    var inp = prompt('AI 분석을 위해 Anthropic API 키가 필요합니다.\n(발급: https://console.anthropic.com)', '');
    if(!inp){ showAiError('API 키가 없어 분석할 수 없습니다.\n상단 [🔑 API 키 설정] 버튼을 이용하세요.', id); return; }
    key = inp.trim();
    localStorage.setItem('anthro_key', key);
  }

  try{
    /* PDF 로드 */
    var pdfRes = await fetch(file);
    if(!pdfRes.ok) throw new Error('PDF 파일 로드 실패 (HTTP ' + pdfRes.status + ')');
    var buf = await pdfRes.arrayBuffer();
    var b64 = arrayBufferToBase64(buf);

    /* Anthropic API 호출 */
    var apiRes = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-opus-4-5',
        max_tokens: 4000,
        messages: [{
          role: 'user',
          content: [
            { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: b64 } },
            { type: 'text', text: makePrompt(univName) }
          ]
        }]
      })
    });

    var apiJson = await apiRes.json();
    if(apiJson.error) throw new Error('[API 오류] ' + apiJson.error.message);

    var respText = apiJson.content
      .filter(function(c){ return c.type === 'text'; })
      .map(function(c){ return c.text; })
      .join('');

    var jsonMatch = respText.match(/\{[\s\S]*\}/);
    if(!jsonMatch) throw new Error('AI 응답을 파싱할 수 없습니다.\n응답: ' + respText.slice(0, 100));

    var analysis = JSON.parse(jsonMatch[0]);
    analysis.name = univName;
    analysis._ai = true;

    /* 캐시 저장 + 렌더링 */
    localStorage.setItem('ai_' + id, JSON.stringify(analysis));
    DB[id] = analysis;
    renderAnalysis(id);

  }catch(e){
    showAiError(e.message, id);
  }
}

function showAiError(msg, id){
  var retryHtml = id
    ? '<br><br><button class="reanalyze-btn" onclick="reanalyze(\'' + id + '\')">🔄 다시 시도</button>'
    : '';
  document.getElementById('apBody').innerHTML =
    '<div class="ph" style="height:100%">' +
    '<div class="ph-icon">⚠️</div>' +
    '<div class="ph-title">분석 오류</div>' +
    '<div class="ph-sub" style="word-break:break-all;">' + msg + retryHtml + '</div>' +
    '</div>';
}


function switchTab(tab){
  var pdf = document.getElementById('panelPdf');
  var ap = document.getElementById('panelAp');
  var tPdf = document.getElementById('tabPdf');
  var tAp = document.getElementById('tabAp');
  if(tab === 'pdf'){
    pdf.classList.add('tab-active'); ap.classList.remove('tab-active');
    tPdf.classList.add('active'); tAp.classList.remove('active');
  } else {
    ap.classList.add('tab-active'); pdf.classList.remove('tab-active');
    tAp.classList.add('active'); tPdf.classList.remove('active');
  }
}
</script>
